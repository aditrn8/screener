<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mas Adit Pro Scanner v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: sans-serif; }
        .card-long { border-left: 5px solid #22c55e; background: linear-gradient(145deg, #1e2329, #0b0e11); }
        .card-short { border-left: 5px solid #ef4444; background: linear-gradient(145deg, #1e2329, #0b0e11); }
        .loading-bar { transition: width 0.3s ease; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .new-signal { animation: pulse-green 2s infinite; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-xl font-bold text-yellow-500">🚀 Mas Adit Scanner v2</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Filters: EMA200 (3%) + EMA21 (3%) + StochRSI</p>
            </div>
            <div class="text-right">
                <div id="scan-status" class="text-[10px] font-mono text-blue-400 uppercase tracking-tighter">Ready</div>
                <div class="w-32 h-1 bg-gray-800 mt-1 rounded-full overflow-hidden">
                    <div id="progress-bar" class="loading-bar h-full bg-blue-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="result-container" class="space-y-4">
            <div id="empty-state" class="text-center py-20 text-gray-600 italic text-sm">
                Mencari Setup Ideal (EMA200 & EMA21 Alignment)...
            </div>
        </div>
    </div>

    <script>
        const intervals = ['4h', '1h', '15m'];
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        // Fungsi Teknikal
        const calculateEMA = (data, p) => {
            const k = 2 / (p + 1);
            let ema = data[0];
            for (let i = 1; i < data.length; i++) {
                ema = (data[i] * k) + (ema * (1 - k));
            }
            return ema;
        };

        const getStochRSI = (closes) => {
            const period = 14;
            if (closes.length < period) return 50;
            const lastCloses = closes.slice(-period);
            const high = Math.max(...lastCloses);
            const low = Math.min(...lastCloses);
            return ((closes[closes.length - 1] - low) / (high - low)) * 100;
        };

        async function getAllUSDT() {
            try {
                const resp = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await resp.json();
                return data.symbols
                    .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')
                    .map(s => s.symbol);
            } catch (e) { return []; }
        }

        async function scanCoin(symbol) {
            let tfReports = [];
            let isLongIdeal = true;
            let isShortIdeal = true;

            for (const tf of intervals) {
                try {
                    const resp = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=210`);
                    const klines = await resp.json();
                    const closes = klines.map(k => parseFloat(k[4]));
                    const lastPrice = closes[closes.length - 1];
                    
                    const ema200 = calculateEMA(closes, 200);
                    const ema21 = calculateEMA(closes, 21);
                    const stochK = getStochRSI(closes);
                    
                    const dist200 = ((lastPrice - ema200) / ema200) * 100;
                    const dist21 = ((lastPrice - ema21) / ema21) * 100;

                    // LONG: Price > EMA200 (0-3%) DAN Price > EMA21 (0-3%) DAN StochRSI OS
                    const longOk = (dist200 >= 0 && dist200 <= 3) && (dist21 >= 0 && dist21 <= 3) && stochK < 20;
                    
                    // SHORT: Price < EMA200 (0-3%) DAN Price < EMA21 (0-3%) DAN StochRSI OB
                    const shortOk = (dist200 <= 0 && dist200 >= -3) && (dist21 <= 0 && dist21 >= -3) && stochK > 80;

                    tfReports.push({ tf, longOk, shortOk, dist200: dist200.toFixed(2), dist21: dist21.toFixed(2) });
                    
                    if (!longOk) isLongIdeal = false;
                    if (!shortOk) isShortIdeal = false;
                } catch (e) { 
                    isLongIdeal = false; 
                    isShortIdeal = false; 
                }
            }

            if (isLongIdeal || isShortIdeal) {
                renderCard(symbol, isLongIdeal ? 'LONG' : 'SHORT', tfReports);
                beep.play();
            }
        }

        function renderCard(symbol, type, reports) {
            const container = document.getElementById('result-container');
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.remove();

            if (document.getElementById(`card-${symbol}`)) return;

            const card = document.createElement('div');
            card.id = `card-${symbol}`;
            card.className = `p-4 rounded-xl shadow-lg mb-4 new-signal ${type === 'LONG' ? 'card-long' : 'card-short'}`;
            
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="font-black text-xl text-white tracking-tighter">${symbol}</span>
                            <span class="text-[10px] px-2 py-0.5 rounded-md font-bold ${type === 'LONG' ? 'bg-green-500 text-black' : 'bg-red-500 text-white'}">${type} ENTRY</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            ${reports.map(r => `
                                <div class="bg-black/40 p-2 rounded-lg border border-gray-800">
                                    <p class="text-[9px] text-gray-500 font-bold uppercase">${r.tf}</p>
                                    <p class="text-[10px] ${type === 'LONG' ? 'text-green-400' : 'text-red-400'}">E200: ${r.dist200}%</p>
                                    <p class="text-[10px] ${type === 'LONG' ? 'text-green-300' : 'text-red-300'} font-bold">E21: ${r.dist21}%</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="ml-4">
                        <a href="https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}" target="_blank" 
                           class="inline-block bg-blue-600 text-white font-bold px-4 py-3 rounded-lg text-xs shadow-lg active:scale-95 transition">
                           VIEW
                        </a>
                    </div>
                </div>
            `;
            container.prepend(card);
        }

        async function startScanner() {
            const statusLabel = document.getElementById('scan-status');
            const progressBar = document.getElementById('progress-bar');
            
            statusLabel.innerText = "UPDATING LIST...";
            const allPairs = await getAllUSDT();
            
            for (let i = 0; i < allPairs.length; i++) {
                const pct = ((i / allPairs.length) * 100).toFixed(0);
                progressBar.style.width = pct + "%";
                statusLabel.innerText = `CHECKING ${allPairs[i]}`;
                
                await scanCoin(allPairs[i]);
                await new Promise(r => setTimeout(r, 120)); 
            }
            
            statusLabel.innerText = "COOLING DOWN...";
            setTimeout(startScanner, 15000);
        }

        startScanner();
    </script>
</body>
</html>
