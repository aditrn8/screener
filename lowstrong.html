<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SMC Structure Screener Trader</title>
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --text: #eaecef; --accent: #f0b90b; --red: #f6465d; --green: #0ecb81; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .controls { background: var(--card); padding: 15px; border-radius: 8px; display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2b3139; }
        th { background: #2b3139; color: #848e9c; font-size: 12px; }
        .sh { color: var(--red); font-weight: bold; background: rgba(246, 70, 93, 0.1); padding: 4px 8px; border-radius: 4px; }
        .sl { color: var(--green); font-weight: bold; background: rgba(14, 203, 129, 0.1); padding: 4px 8px; border-radius: 4px; }
        button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #progress { color: var(--accent); margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>📊 Smart Money Screener (Strong H/L)</h2>
    <div class="controls">
        <select id="tf" style="padding: 10px; background: #474d57; color: white; border: none; border-radius: 5px;">
            <option value="5m">5m</option>
            <option value="15m" selected>15m</option>
            <option value="1h">1h</option>
            <option value="4h">4h</option>
        </select>
        <button onclick="startScan()">Scan Market Structure</button>
        <span id="progress">Ready</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Pair</th>
                <th>Sinyal Structure</th>
                <th>Price</th>
                <th>TF</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>

<script>
    async function startScan() {
        const tf = document.getElementById('tf').value;
        const resultBody = document.getElementById('resultBody');
        const progress = document.getElementById('progress');
        
        resultBody.innerHTML = '';
        progress.innerText = "Fetching Pairs...";

        try {
            // Gunakan fapi (Futures) agar lebih minim CORS error
            const resp = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo');
            const data = await resp.json();
            const pairs = data.symbols.filter(s => s.quoteAsset === 'USDT').map(s => s.symbol).slice(0, 150); // Scan 150 pair teratas

            for (let i = 0; i < pairs.length; i++) {
                progress.innerText = `Scanning ${i+1}/${pairs.length}`;
                await checkStructure(pairs[i], tf);
                await new Promise(r => setTimeout(r, 50)); // Delay agar tidak limit
            }
            progress.innerText = "Scan Selesai!";
        } catch (e) {
            progress.innerText = "Error! Pakai extension 'Allow CORS' jika macet.";
        }
    }

    async function checkStructure(pair, tf) {
        try {
            const resp = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${pair}&interval=${tf}&limit=100`);
            const candles = await resp.json();
            if (candles.length < 50) return;

            const highs = candles.map(c => parseFloat(c[2]));
            const lows = candles.map(c => parseFloat(c[3]));
            const closes = candles.map(c => parseFloat(c[4]));

            // Index candle ke-3 (untuk konfirmasi fractal)
            const i = candles.length - 3;

            // 1. Logika Strong High (SMC Style): 
            // Titik tertinggi yang diikuti Break of Structure (Close di bawah low sebelumnya)
            let isStrongHigh = (highs[i] > highs[i-1] && highs[i] > highs[i-2] && highs[i] > highs[i+1] && highs[i] > highs[i+2]);
            let hasBOS_Down = closes[i+2] < lows[i-1]; // Konfirmasi harga turun tembus low fractal

            // 2. Logika Strong Low:
            // Titik terendah yang diikuti Break of Structure (Close di atas high sebelumnya)
            let isStrongLow = (lows[i] < lows[i-1] && lows[i] < lows[i-2] && lows[i] < lows[i+1] && lows[i] < lows[i+2]);
            let hasBOS_Up = closes[i+2] > highs[i-1];

            if ((isStrongHigh && hasBOS_Down) || (isStrongLow && hasBOS_Up)) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><b>${pair}</b></td>
                    <td><span class="${isStrongHigh ? 'sh' : 'sl'}">${isStrongHigh ? '⬇️ STRONG HIGH (BOS)' : '⬆️ STRONG LOW (BOS)'}</span></td>
                    <td>${isStrongHigh ? highs[i] : lows[i]}</td>
                    <td>${tf}</td>
                    <td><a href="https://www.binance.com/en/futures/${pair}" target="_blank" style="color:var(--accent)">Chart →</a></td>
                `;
                document.getElementById('resultBody').prepend(row);
            }
        } catch (e) {}
    }
</script>
</body>
</html>
