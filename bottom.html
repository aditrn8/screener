<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottom Hunter V2.4 - THE REAL FAHHHHHHH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; }
        .loading-bar { transition: width 0.3s ease; }
        tr:hover { background-color: rgba(255, 255, 255, 0.05); }
        @keyframes pulse-gold {
            0%, 100% { background-color: rgba(234, 179, 8, 0.1); }
            50% { background-color: rgba(234, 179, 8, 0.4); }
        }
        .found-pulse { animation: pulse-gold 2s infinite; border-left: 4px solid #eab308; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 border-b border-gray-800 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-yellow-500 flex items-center gap-2">
                    🌟 ULTIMATE FAHHHH SCANNER <span class="text-xs bg-yellow-500 text-black px-2 py-1 rounded">V2.4</span>
                </h1>
                <p class="text-sm text-gray-400 mt-1">
                    Logika: <span class="text-blue-400">Price 0-3% Below EMA200</span> + <span class="text-red-400">RSI < 30</span> (No Vol Limit)
                </p>
                
                <div class="flex items-center gap-4 mt-4 flex-wrap">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-semibold uppercase text-gray-500 text-[10px]">Timeframe:</span>
                        <select id="tf-select" class="bg-gray-800 text-sm p-2 rounded-lg border border-gray-700 text-white outline-none cursor-pointer hover:border-yellow-500">
                            <option value="15m">15M</option>
                            <option value="1h" selected>1H</option>
                            <option value="4h">4H</option>
                            <option value="1d">1D</option>
                        </select>
                    </div>
                    <button onclick="playUltimateFahhh()" class="text-xs bg-yellow-600 hover:bg-yellow-500 text-black font-bold px-4 py-2 rounded-lg flex items-center gap-2 shadow-lg shadow-yellow-900/40 transform active:scale-95 transition">
                        🔊 TEST SUARA "FAHHHHHH"
                    </button>
                    <button onclick="clearTable()" class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-400 px-3 py-2 rounded-lg border border-gray-700">
                        🗑️ Clear Table
                    </button>
                </div>
            </div>

            <div class="w-full md:w-auto text-left md:text-right">
                <div id="scan-status" class="text-[10px] font-mono uppercase tracking-[0.2em] text-blue-400 mb-2 italic font-bold">Initializing...</div>
                <div class="w-full md:w-64 h-2 bg-gray-800 rounded-full overflow-hidden border border-gray-700">
                    <div id="progress-bar" class="loading-bar h-full bg-gradient-to-r from-yellow-600 to-yellow-400" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="bg-gray-900 rounded-xl overflow-hidden shadow-2xl border border-gray-800">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-800/50 text-gray-400 uppercase text-[10px] tracking-widest">
                        <tr>
                            <th class="p-4">Pair (USDT)</th>
                            <th class="p-4 text-center">Harga / EMA200</th>
                            <th class="p-4 text-center">RSI (14)</th>
                            <th class="p-4 text-center">Gap (%)</th>
                            <th class="p-4 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="result-table" class="divide-y divide-gray-800"></tbody>
                </table>
            </div>
            <div id="empty-state" class="p-16 text-center">
                <div class="text-5xl mb-4 opacity-20 animate-bounce">🔎</div>
                <div class="text-gray-600 italic font-semibold">Menunggu koin yang bikin lega... "Fahhhhhh"</div>
            </div>
        </div>
    </div>

    <script>
        const fahhhSound = new Audio('https://www.myinstants.com/media/sounds/fahhhhhhhhhhhhhh-3525.mp3');
        fahhhSound.volume = 1.0;

        function playUltimateFahhh() {
            fahhhSound.currentTime = 0;
            fahhhSound.play().catch(() => {
                alert("Wajib klik tombol 'TEST SUARA' dulu ya Bang agar browser mengizinkan audio otomatis!");
            });
        }

        let isScanning = false;
        let pairsAlreadyFound = new Set();

        const calculateEMA = (data, p) => {
            const k = 2 / (p + 1);
            let ema = data[0];
            for (let i = 1; i < data.length; i++) ema = (data[i] * k) + (ema * (1 - k));
            return ema;
        };

        const calculateRSI = (closes, p = 14) => {
            if (closes.length <= p) return 50;
            let g = 0, l = 0;
            for (let i = closes.length - p; i < closes.length; i++) {
                const d = closes[i] - closes[i - 1];
                d >= 0 ? g += d : l -= d;
            }
            return l === 0 ? 100 : 100 - (100 / (1 + (g / l)));
        };

        function clearTable() {
            document.getElementById('result-table').innerHTML = "";
            document.getElementById('empty-state').classList.remove('hidden');
            pairsAlreadyFound.clear();
        }

        async function scanCoin(symbol, tf) {
            try {
                const resp = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=250`);
                const klines = await resp.json();
                if (klines.length < 200) return;

                const closes = klines.map(k => parseFloat(k[4]));
                const lastPrice = closes[closes.length - 1];
                const ema200 = calculateEMA(closes, 200);
                const rsi = calculateRSI(closes);

                // LOGIKA: Harga di bawah EMA 0-3% & RSI < 30
                const dist = ((ema200 - lastPrice) / ema200) * 100;
                
                if (dist > 0 && dist <= 3 && rsi < 30) {
                    if (!pairsAlreadyFound.has(symbol)) {
                        playUltimateFahhh(); // Bunyikan suara MyInstants
                        pairsAlreadyFound.add(symbol);
                    }
                    renderRow(symbol, lastPrice, ema200, rsi, dist.toFixed(2));
                    document.getElementById('empty-state').classList.add('hidden');
                }
            } catch (e) {}
        }

        function renderRow(symbol, price, ema, rsi, dist) {
            if (document.getElementById(`row-${symbol}`)) return;
            const tbody = document.getElementById('result-table');
            const row = document.createElement('tr');
            row.id = `row-${symbol}`;
            row.className = "found-pulse transition duration-1000";
            row.innerHTML = `
                <td class="p-4 font-bold text-yellow-500 tracking-tight">👑 ${symbol}</td>
                <td class="p-4 text-center font-mono text-xs">
                    <div class="text-white font-bold">${price.toFixed(price < 1 ? 6 : 4)}</div>
                    <div class="text-[9px] text-gray-600">EMA: ${ema.toFixed(ema < 1 ? 6 : 4)}</div>
                </td>
                <td class="p-4 text-center">
                    <span class="px-2 py-1 rounded bg-red-900/40 text-red-500 font-bold border border-red-800/50">${rsi.toFixed(2)}</span>
                </td>
                <td class="p-4 text-center text-green-400 font-bold italic tracking-tighter">-${dist}%</td>
                <td class="p-4 text-center flex justify-center gap-2">
                    <a href="https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}" target="_blank" 
                       class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded text-[10px] font-bold shadow-lg transition">TV</a>
                    <button class="bg-yellow-600 text-black px-3 py-1.5 rounded text-[10px] font-bold shadow-lg uppercase tracking-tighter" onclick="alert('Gaspol Bang!')">Sikat!</button>
                </td>
            `;
            tbody.prepend(row);
            setTimeout(() => row.classList.remove('found-pulse'), 8000);
        }

        async function startScanner() {
            if (isScanning) return;
            isScanning = true;
            const tf = document.getElementById('tf-select').value;
            
            try {
                const resp = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await resp.json();
                const allPairs = data.symbols.filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING').map(s => s.symbol);

                for (let i = 0; i < allPairs.length; i++) {
                    const pct = ((i / allPairs.length) * 100).toFixed(0);
                    document.getElementById('progress-bar').style.width = pct + "%";
                    document.getElementById('scan-status').innerText = `Searching ${tf}: ${allPairs[i]}`;
                    await scanCoin(allPairs[i], tf);
                    await new Promise(r => setTimeout(r, 45)); 
                }

                document.getElementById('scan-status').innerText = `Scan Selesai. Re-scanning in 30s...`;
                isScanning = false;
                setTimeout(startScanner, 30000);
            } catch (err) {
                isScanning = false;
                setTimeout(startScanner, 10000);
            }
        }

        document.getElementById('tf-select').addEventListener('change', () => {
            isScanning = false;
            clearTable();
            startScanner();
        });

        startScanner();
    </script>
</body>
</html>
