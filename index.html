<div class="flex justify-between items-end mb-6 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-yellow-500">🚀 Bottom Hunter Scanner</h1>
                <p class="text-xs text-gray-400">Filter: Price 0-3% BELOW EMA200 | RSI < 30 | Vol > 1M USDT</p>
                <div class="mt-4">
                    <label class="text-xs text-gray-500 uppercase">Select Timeframe:</label>
                    <select id="tf-select" class="bg-gray-800 text-sm p-1 rounded border border-gray-700 text-white outline-none">
                        <option value="15m">15 Minutes</option>
                        <option value="1h" selected>1 Hour</option>
                        <option value="4h">4 Hours</option>
                        <option value="1d">1 Day</option>
                    </select>
                </div>
            </div>
            <div class="text-right">
                <div id="scan-status" class="text-sm font-mono uppercase text-blue-400">Ready</div>
                <div class="w-48 h-1 bg-gray-800 mt-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="loading-bar h-full bg-blue-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <div class="bg-gray-900 rounded-xl overflow-hidden shadow-2xl border border-gray-800">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-800 text-gray-300">
                        <tr>
                            <th class="p-4">Pair</th>
                            <th class="p-4">Price / EMA</th>
                            <th class="p-4 text-center">RSI</th>
                            <th class="p-4 text-center">Vol (24h)</th>
                            <th class="p-4 text-center">Dist (%)</th>
                            <th class="p-4 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="result-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        // Math Logic
        const calculateEMA = (data, p) => {
            const k = 2 / (p + 1);
            return data.reduce((acc, val, i) => i === 0 ? val : (val * k) + (acc * (1 - k)), data[0]);
        };

        const calculateRSI = (closes, period = 14) => {
            let gains = 0, losses = 0;
            for (let i = closes.length - period; i < closes.length; i++) {
                const diff = closes[i] - closes[i - 1];
                diff >= 0 ? gains += diff : losses -= diff;
            }
            const rs = gains / losses;
            return 100 - (100 / (1 + rs));
        };

        async function scanCoin(symbol, tf) {
            try {
                const resp = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=250`);
                const klines = await resp.json();
                
                const closes = klines.map(k => parseFloat(k[4]));
                const lastVol = parseFloat(klines[klines.length - 1][7]); // Quote Asset Volume (USDT)
                const lastPrice = closes[closes.length - 1];
                const ema200 = calculateEMA(closes, 200);
                const rsi = calculateRSI(closes);

                // LOGIC BARU:
                // 1. Price below EMA200 between 0% to 3%
                const dist = ((ema200 - lastPrice) / ema200) * 100;
                const isBelowEmaOk = dist > 0 && dist <= 3;
                
                // 2. RSI Oversold (< 30)
                const isRsiOversold = rsi < 30;

                // 3. Volume Good (Contoh: > 1,000,000 USDT di candle terakhir)
                const isVolGood = lastVol > 1000000;

                if (isBelowEmaOk && isRsiOversold && isVolGood) {
                    renderRow(symbol, lastPrice, ema200, rsi, lastVol, dist.toFixed(2));
                    beep.play();
                }
            } catch (e) { console.error(e); }
        }

        function renderRow(symbol, price, ema, rsi, vol, dist) {
            const tbody = document.getElementById('result-table');
            const row = document.createElement('tr');
            row.className = "border-b border-gray-800 hover:bg-gray-800 transition";
            row.innerHTML = `
                <td class="p-4 font-bold text-yellow-400">${symbol}</td>
                <td class="p-4 font-mono text-gray-300">${price} <span class="text-xs text-gray-500">/ ${ema.toFixed(4)}</span></td>
                <td class="p-4 text-center text-red-400 font-bold">${rsi.toFixed(2)}</td>
                <td class="p-4 text-center text-blue-300 font-mono">${(vol/1000000).toFixed(1)}M</td>
                <td class="p-4 text-center text-green-400">-${dist}%</td>
                <td class="p-4 text-center">
                    <a href="https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}" target="_blank" class="bg-yellow-600 px-3 py-1 rounded text-xs font-bold text-black hover:bg-yellow-500">TRADE</a>
                </td>
            `;
            tbody.prepend(row);
        }

        async function startScanner() {
            const tf = document.getElementById('tf-select').value;
            document.getElementById('result-table').innerHTML = ""; // Clear table
            document.getElementById('scan-status').innerText = "Fetching Pairs...";
            
            const resp = await fetch('https://api.binance.com/api/v3/exchangeInfo');
            const data = await resp.json();
            const allPairs = data.symbols.filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING').map(s => s.symbol);

            for (let i = 0; i < allPairs.length; i++) {
                const pct = ((i / allPairs.length) * 100).toFixed(0);
                document.getElementById('progress-bar').style.width = pct + "%";
                document.getElementById('scan-status').innerText = `Scanning ${tf}: ${allPairs[i]}`;
                
                await scanCoin(allPairs[i], tf);
                await new Promise(r => setTimeout(r, 50)); // Fast scan
            }
            document.getElementById('scan-status').innerText = "Scan Selesai. Standby...";
            setTimeout(startScanner, 60000);
        }

        // Jalankan saat dropdown diganti
        document.getElementById('tf-select').addEventListener('change', startScanner);
        
        startScanner();
    </script>
